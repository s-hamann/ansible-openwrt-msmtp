---
- name: 'Determine msmtp package variant'
  ansible.builtin.set_fact:
    msmtp_package: "{{ (msmtp_default_config['tls'] | default(false) or msmtp_accounts.values() | map(attribute='tls') | select | length > 0) | ternary('msmtp', 'msmtp-nossl') }}"
  when: "msmtp_package is not defined"

- name: 'Install msmtp'
  community.openwrt.apk:
    name: "{{ msmtp_package }}"
    state: installed
  when: "ansible_facts['pkg_mgr'] == 'apk'"

- name: 'Install msmtp'
  community.openwrt.opkg:
    name: "{{ msmtp_package }}"
    state: installed
  when: "ansible_facts['pkg_mgr'] == 'opkg'"

- name: 'Create user group'
  community.openwrt.group:
    name: "{{ msmtp_group }}"
    system: true
    state: present
  when: "msmtp_group is defined"

- name: 'Configure msmtp'
  community.openwrt.template:
    dest: '/etc/msmtprc'
    src: 'msmtprc.j2'
    owner: root
    group: "{{ msmtp_group | default('root') }}"
    mode: '0640'
  no_log: "{{ msmtp_accounts.values() | map(attribute='password') | select | length > 0 }}"

- name: 'Symlink sendmail to msmtp'
  community.openwrt.file:
    path: '/usr/sbin/sendmail'
    state: link
    owner: root
    group: root
    src: '/usr/bin/msmtp'
